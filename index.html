const SYS_PROMPT=`You are an expert SDR Intelligence and Competitive Positioning Analyst. FULLY ANALYZE everything before generating outreach.

HARD RULES:
- NEVER use brand names (elsai, O2V, OptiSol, AI Foundry, iBEAM) in outreach. Use "our team", "our platform", "we have helped".
- NEVER use em dash character anywhere in subject or body. Use commas, periods, or "..." instead.
- CTA MUST always ask for a quick call or chat.
- NEVER pitch a solution directly. Reference what you have done or seen from case studies as natural observation.
- If user selected a preferred solution, ALWAYS evaluate it, but do NOT force a sales pitch if the account is a competitor or there is no signal-based fit. Independently determine the actual best-fit. If they differ, include betterFitSuggestion.
- If user selected OTHER solution, prioritize the custom solution name, supporting link, and notes provided by the user. Base the output on those custom solution details and do not substitute a default Solution Library item unless the custom details are empty or clearly irrelevant.
- OUTREACH MUST BE SPECIFIC. Every email/LinkedIn/call output must mention at least one concrete target-company signal and one persona-relevant implication. Avoid generic phrases like "digital transformation", "streamline operations", "leverage AI", "unlock value", or "improve efficiency" unless tied to a named signal.
- If the available intelligence is shallow, do NOT pretend. Say the match is weak in the analysis and write a more cautious outreach based on the strongest available signal.
- Recommended solution must be evidence-led. No solution can be selected unless at least two specific signals support it, except when the user explicitly chooses OTHER and gives custom solution details.

ANALYSIS (DO ALL 7 STEPS THOROUGHLY):

STEP 0 - USER COMPANY CONTEXT: Use the user's company profile to understand who the seller is, their industry, website, and positioning. Do NOT treat this as the detailed offerings list. Detailed offerings, ICP, metrics, and case studies must come from the Solution Repository. Classify the target account relationship as one of: prospect, competitor, partner, customer, vendor, unknown. If the target company provides similar IT services, digital engineering, AI/data services, cloud/app modernization, or staffing services, treat it as a likely competitor unless evidence says otherwise.

STEP 1 - TARGET COMPANY INTELLIGENCE: Extract from provided intel:
- Industry and sub-industry
- Company size and growth stage
- Hiring patterns (what roles, how many, which departments)
- Funding events or revenue signals
- Technology stack and digital initiatives
- Expansion signals (new markets, geographies, products)
- Partnerships, acquisitions, or M&A activity
- Organizational changes (new leadership, restructuring)
- Regulatory or compliance pressures
Convert to: business priorities, strategic direction, growth stage. If PDF intelligence is provided, prioritize its named technologies, org structure, decision makers, buying triggers, persona map, growth signals, and pain indicators over generic company descriptions.

STEP 2 - BUSINESS PROBLEMS: Infer 3-5 specific challenges. Each MUST trace to a signal from Step 1. Do NOT use generic problems like "data quality" unless there is a specific signal pointing to it.

STEP 3 - PERSONA DEEP ANALYSIS: From role + LinkedIn details + LinkedIn research:
- What they own (budget, team, outcomes)
- What KPIs they are measured on
- What keeps them up at night
- Recent focus areas (from LinkedIn posts, career moves, stated interests)
- How company problems from Step 2 specifically land on THEIR desk
- Their decision-making authority level

STEP 4 - SOLUTION MATCHING (CRITICAL - BE PRECISE):
Match based on the INTERSECTION of: (a) company industry + signals, (b) inferred problems, (c) persona role + priorities.

SPECIFICITY RULES:
- Do NOT choose a broad horizontal solution just because no vertical solution fits.
- Do NOT choose Preparing Data for AI as a default fallback. It is valid ONLY when the target intelligence explicitly mentions data fragmentation, governance, pipelines, analytics gaps, data platforms, BI modernization, lakehouse/warehouse, or AI blocked by data readiness.
- If the target is an IT services, consulting, software development, cloud, AI/data services, or staffing company, first classify the account as competitor or partner candidate. In that case, prefer competitor-aware positioning or partnership context. Do NOT recommend Preparing Data for AI unless explicit internal data-platform pain exists.
- If persona is HR, sales, marketing, procurement, operations, or leadership without solution-specific signals, say No strong match instead of forcing a solution.
- Every recommendedSolution.signalMatch MUST name the exact source signals. If you cannot name them, return id "no-strong-match" and name "No strong match".

MATCHING RULES:
- Life Sciences AI: ONLY match if company is pharma, biotech, CRO, or runs clinical trials. Signals: protocol reviews, IRB submissions, clinical documentation, TMF, regulatory compliance.
- Content Intelligence: ONLY match if company deals with content syndication, eCommerce product data, publishing, media distribution, or financial content automation.
- Preparing Legacy for AI: ONLY match if company has specific legacy systems (PowerBuilder, Oracle Forms, Sybase, Pega, Informatica) mentioned in intel. Signals: legacy modernization, technical debt, migration plans.
- Preparing Data for AI: ONLY match if there are EXPLICIT, concrete signals about data fragmentation, governance problems, data pipeline issues, analytics gaps, warehouse/lakehouse/BI modernization, CDC/ETL, or blocked AI initiatives due to data readiness. NEVER use it for generic IT services companies, generic digital transformation, generic AI interest, or when the only signal is that the company is technology-related.
- AI Squad Augmentation: ONLY match if company is hiring AI/ML roles, building AI teams, running POCs, or has explicit signals about needing AI talent. Signals: AI hiring, team scaling, POC/MVP projects.
- Supply Chain Intelligence: ONLY match if company is in logistics, manufacturing, retail, 3PL, or has supply chain operations. Signals: warehouse, inventory, shipping, demand forecasting, labour management, equipment.
- Financial Operations Intelligence: ONLY match if persona is in finance, or company has high-volume invoice processing, contract management, or compliance/ESG reporting needs.

If NO solution is a strong match based on actual signals, say "No strong match" and explain why. Do NOT force a match.
If MULTIPLE solutions match, rank them by signal strength.

STEP 5 - CASE STUDY MATCHING: Review matched solution metrics. Prepare ANONYMIZED reference if relevant ("a similar-sized logistics company" not the actual name). Skip if none fits naturally.

STEP 6 - LINKEDIN PROFILE ANALYSIS: If LinkedIn details are provided, extract:
- Career trajectory and expertise areas
- Recent posts, articles, or activity themes
- Stated skills and endorsements
- Any personal interests or communication style cues
Use these to personalize the outreach.

STEP 7 - GENERATE OUTPUTS using ALL analysis from steps 0-6. Generate EVERY output type requested. If relationship is competitor, do NOT create a normal sales pitch. Create competitor-aware positioning: concise opener, observed overlap, differentiation angle, and optional partnership-style CTA only if appropriate. If no strong solution match exists, explain no strong match and avoid generic data/AI pitches.

Each output MUST reference at least one concrete company signal and one persona-specific detail. No generic filler.

EMAIL STRUCTURE (100-120 words):
1. OPENING (1-2 sentences): Company signal + persona role connection.
2. PERSONA HOOK (1-2 sentences): Reference their LinkedIn focus, career detail, or how the challenge specifically hits their function.
3. INSIGHT (2-3 sentences): Consultant-style observation about their specific challenge. Weave anonymized case study naturally if relevant. Do NOT pitch.
4. CTA (1 sentence): Ask for a quick call or chat.

LINKEDIN MESSAGE (40-70 words):
Persona reference + insight tied to a company signal + soft CTA for a quick chat. Conversational, not formal.

LINKEDIN CONNECTION REQUEST NOTE (under 300 characters, this is a hard LinkedIn limit):
Very short, personal, non-salesy. Reference one specific thing about their role, a recent post, or shared context. Goal is to get accepted, NOT to pitch. No CTA for a call. Just a warm, relevant reason to connect.
Examples: "Hi [name], saw your work on [specific thing]. Would love to connect and follow your perspective on [topic]." or "Hi [name], your [specific initiative/post] caught my attention. Great to see [observation]. Would love to connect."

COLD CALL SCRIPT:
Opening hook (who you are, why you are calling in 1 sentence) -> context reference (specific company signal) -> problem insight (how it affects their role) -> case study mention if relevant (anonymized) -> engaging question that opens dialogue, not a yes/no question.

const CORS_PROXIES=[
  'https://corsproxy.io/?url=',
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.org/?url=',
  'https://proxy.cors.sh/'
];
let activeCorsProxy=0;

function proxyUrl(url,useProxy){
  if(!useProxy) return url;
  const proxy=CORS_PROXIES[activeCorsProxy%CORS_PROXIES.length];
  // Some proxies need encoded URL, some need raw
  if(proxy.includes('cors.sh')) return proxy+url;
  return proxy+encodeURIComponent(url);
}

async function fetchWithProxyFallback(url,opts,useProxy){
  if(!useProxy) return fetch(url,opts);
  // Try current proxy, if it fails try next
  for(let i=0;i<CORS_PROXIES.length;i++){
    const idx=(activeCorsProxy+i)%CORS_PROXIES.length;
    const proxy=CORS_PROXIES[idx];
    const pUrl=proxy.includes('cors.sh')?proxy+url:proxy+encodeURIComponent(url);
    try{
      const r=await fetch(pUrl,opts);
      if(r.ok||r.status<500){activeCorsProxy=idx;return r;}
    }catch(e){
      if(i===CORS_PROXIES.length-1) throw e;
    }
  }
  throw new Error('All CORS proxies failed. Try disabling the proxy or using Gemini (which works without a proxy).');
}

async function callAIOnce(cfg,{system,userContent},retries=2){
  const delay=ms=>new Promise(r=>setTimeout(r,ms));
  for(let attempt=1;attempt<=retries;attempt++){
    try{
      let text='';
      if(cfg.provider==='anthropic'){
        const body={model:cfg.model,max_tokens:6000,system,messages:[{role:"user",content:userContent}]};
        const r=await fetchWithProxyFallback(cfg.url,{method:"POST",headers:{"Content-Type":"application/json","x-api-key":cfg.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)},cfg.useProxy);
        const d=await r.json();if(d.error) throw new Error(d.error.message);
        text=(d.content||[]).map(b=>b.text||"").filter(Boolean).join("\n");
      } else if(cfg.provider==='gemini'){
        const fullUrl=`${cfg.url}/models/${cfg.model}:generateContent?key=${cfg.key}`;
        const body={system_instruction:{parts:[{text:system}]},contents:[{parts:Array.isArray(userContent)?userContent:[{text:typeof userContent==='string'?userContent:JSON.stringify(userContent)}]}]};
        const r=await fetchWithProxyFallback(fullUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)},cfg.useProxy);
        const d=await r.json();if(d.error) throw new Error(d.error.message);
        text=d.candidates?.[0]?.content?.parts?.[0]?.text||'';
      } else if(cfg.provider==='cloudflare'){
        if(!cfg.cfAccountId) throw new Error('Cloudflare Account ID is required. Add it in the API Key tab.');
        const fullUrl=`${cfg.url}/${cfg.cfAccountId}/ai/run/${cfg.model}`;
        const msgs=[{role:"system",content:system},{role:"user",content:typeof userContent==='string'?userContent:JSON.stringify(userContent)}];
        const r=await fetchWithProxyFallback(fullUrl,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${cfg.key}`},body:JSON.stringify({messages:msgs})},cfg.useProxy);
        const d=await r.json();if(d.errors?.length) throw new Error(d.errors.map(x=>x.message).join('; '));if(d.error) throw new Error(d.error.message||JSON.stringify(d.error));
        text=d.result?.response||d.result?.content||d.result?.text||'';
      } else {
        const msgs=[{role:"system",content:system},{role:"user",content:typeof userContent==='string'?userContent:JSON.stringify(userContent)}];
        const headers={"Content-Type":"application/json","Authorization":`Bearer ${cfg.key}`};
        if(cfg.provider==='openrouter'){headers["HTTP-Referer"]=location.origin;headers["X-Title"]='SDR Engine'}
        const r=await fetchWithProxyFallback(cfg.url,{method:"POST",headers,body:JSON.stringify({model:cfg.model,messages:msgs,max_tokens:6000})},cfg.useProxy);
        const d=await r.json();if(d.error) throw new Error(d.error.message||JSON.stringify(d.error));
        text=d.choices?.[0]?.message?.content||'';
      }
      return text;
    }catch(e){
      const msg=e.message||'';
      // If Failed to fetch and proxy not enabled, suggest enabling it
      if(msg.includes('Failed to fetch')&&!cfg.useProxy){
        throw new Error('Failed to fetch. This is likely a CORS error. Go to API Key tab and enable "Use CORS Proxy" toggle, then try again.');
      }
      if(attempt<retries&&(msg.includes('high demand')||msg.includes('overloaded')||msg.includes('RESOURCE_EXHAUSTED')||msg.toLowerCase().includes('quota')||msg.includes('free_tier_requests')||msg.includes('rate')||msg.includes('429')||msg.includes('503'))){

      }

    }

}

function isUsableApiKey(k,wantsPdf=false){
  if(!k||k.enabled===false||!String(k.key||'').trim()) return false;
  if(wantsPdf&&!(k.provider==='gemini'||k.provider==='anthropic')) return false;
  if(k.provider==='cloudflare'&&!String(k.cfAccountId||'').trim()) return false;
  if((k.provider==='custom'||!PRESETS[k.provider])&&(!String(k.url||'').trim()||!String(k.model||'').trim())) return false;
  return true;
}


function parseRetryAfterSeconds(msg){
  const m=String(msg||'').match(/retry in\s+([0-9.]+)s/i);
  return m?Math.ceil(parseFloat(m[1])):null;
}
function friendlyProviderError(err,tried){
  const msg=err?.message||'All API keys failed';
  const retry=parseRetryAfterSeconds(msg);
  if(/quota|rate.?limit|RESOURCE_EXHAUSTED|free_tier_requests|retry in/i.test(msg)){
    return `All available AI keys hit a limit or failed. ${retry?`Gemini can retry in about ${retry} seconds. `:''}Add another working key/provider, disable exhausted keys temporarily, or try again after the provider reset. Tried: ${tried.join(' -> ')}`;
  }
  if(/billing|plan/i.test(msg)){
    return `The selected provider rejected the request because of plan, billing, or quota limits. Add another free key/provider or disable this key. Tried: ${tried.join(' -> ')}`;
  }
  if(/Cloudflare Account ID/i.test(msg)){
    return `Cloudflare is missing Account ID, so it cannot run. Add the Account ID in advanced settings or disable Cloudflare. Tried: ${tried.join(' -> ')}`;
  }
  return `${msg} | Tried ${tried.join(' -> ')}`;
}

async function callAI(cfg,args,retries=2){
  const failoverMessages=['rate','429','quota','limit','RESOURCE_EXHAUSTED','insufficient_quota','credit','billing','overloaded','high demand','503','500','timeout','Failed to fetch'];
  const wantsPdf=JSON.stringify(args.userContent||'').includes('application/pdf')||JSON.stringify(args.userContent||'').includes('inlineData');
  const rawList=(cfg.apiKeys&&cfg.apiKeys.length?cfg.apiKeys:[{id:'legacy',label:PRESETS[cfg.provider]?.name||cfg.provider,provider:cfg.provider,key:cfg.key,url:cfg.url,model:cfg.model,cfAccountId:cfg.cfAccountId,enabled:true}]);
  const list=rawList.filter(k=>isUsableApiKey(k,wantsPdf));
  if(!list.length){
    const cfIncomplete=rawList.some(k=>k&&k.enabled!==false&&k.provider==='cloudflare'&&String(k.key||'').trim()&&!String(k.cfAccountId||'').trim());
    if(cfIncomplete) throw new Error('No usable API keys found. Cloudflare was skipped because Account ID is missing. Add Account ID in the advanced settings, or add Gemini/Groq/OpenRouter key.');
    throw new Error(wantsPdf?'No PDF-capable API key found. Add Gemini or Anthropic key in the AI Engine tab.':'No usable API keys found. Add at least one complete key in the AI Engine tab.');
  }
  const ordered=[...list]; // Use keys in the exact top-to-bottom order selected by the user. Failover only moves to the next key for the current request.
  let lastErr=null;
  const tried=[];
  for(const k of ordered){
    const single={...cfg,...k,provider:k.provider||cfg.provider,url:k.url||PRESETS[k.provider||cfg.provider]?.url||cfg.url,model:k.model||PRESETS[k.provider||cfg.provider]?.model||cfg.model,cfAccountId:k.cfAccountId||cfg.cfAccountId};
    tried.push(k.label||PRESETS[k.provider]?.name||k.provider);
    try{
      const out=await callAIOnce(single,args,retries);
      k.lastUsedAt=Date.now();k.lastError='';k.successCount=(k.successCount||0)+1;
      return out;
    }catch(e){
      lastErr=e;const msg=e.message||'';k.lastFailedAt=Date.now();k.lastError=msg.slice(0,160);
      if(!failoverMessages.some(x=>msg.toLowerCase().includes(x.toLowerCase()))) break;
    }
  }
  throw new Error(friendlyProviderError(lastErr,tried));
}

async function readPDF(f){return new Promise((r,j)=>{const x=new FileReader();x.onload=()=>r(x.result.split(",")[1]);x.onerror=()=>j(new Error("Read failed"));x.readAsDataURL(f)})}

function cleanAIText(t){return (t||'').replace(/```json|```/gi,'').trim()}
function extractJSON(t){
  const cleaned=cleanAIText(t);
  try{return JSON.parse(cleaned)}catch(e){}
  const first=cleaned.indexOf('{');
  const last=cleaned.lastIndexOf('}');
  if(first>=0&&last>first){
    const slice=cleaned.slice(first,last+1);

  throw new Error('AI returned text instead of valid JSON. Please retry, or switch to a stronger model/provider. Preview: '+cleaned.slice(0,180));
}

function safeText(v){
  if(v===null||v===undefined) return '';
  if(typeof v==='string'||typeof v==='number'||typeof v==='boolean') return String(v);
  if(Array.isArray(v)) return v.map(safeText).filter(Boolean).join(' | ');
  if(typeof v==='object'){
    const keys=['text','value','summary','signal','reason','name','title','description','source','metric','insight','hook','priority','problem'];
    const parts=[];
    keys.forEach(k=>{if(v[k]!==undefined&&v[k]!==null&&v[k]!=='') parts.push(safeText(v[k]));});
    if(parts.length) return parts.join(' - ');
    try{return JSON.stringify(v)}catch(e){return '[object]'}
  }
  return String(v);
}
function safeArray(v){
  if(!v) return [];
  if(Array.isArray(v)) return v;
  if(typeof v==='string') return v.split(/\n|;|\|/).map(x=>x.trim()).filter(Boolean);
  return [v];
}

  return r;
}
class AppErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={error:null}}
  static getDerivedStateFromError(error){return {error}}
  componentDidCatch(error,info){console.error('UI render error',error,info)}
  render(){
    if(this.state.error){
      return h('div',{style:{minHeight:'100vh',background:'var(--bg)',padding:28,fontFamily:'var(--fn)',color:'var(--t)'}},
        h('div',{className:'card',style:{maxWidth:820,margin:'40px auto',padding:28,borderColor:'rgba(220,38,38,.25)'}},
          h('h2',{style:{fontSize:20,color:'var(--tb)',marginBottom:8}},'Something went wrong while displaying the output'),
          h('p',{style:{fontSize:14,color:'var(--td)',lineHeight:1.7,marginBottom:14}},'The run did not clear your saved setup. This usually happens when an AI response contains an unexpected format. Reload the page and try again.'),
          h('pre',{style:{whiteSpace:'pre-wrap',fontSize:12,color:'var(--rd)',background:'var(--rd2)',padding:12,borderRadius:8}},safeText(this.state.error.message||this.state.error)),
          h('button',{className:'btn btn-p',style:{marginTop:14},onClick:()=>{this.setState({error:null});window.location.reload()}},'Reload tool')
        )
      )
    }
    return this.props.children;
  }
}

function IB(l,c,items,t){
  items=safeArray(items);
  if(!items.length)return null;
  return h('div',{style:{marginBottom:16}},
    h('div',{style:{fontSize:11,fontFamily:'var(--mn)',color:c,letterSpacing:'.04em',marginBottom:8,fontWeight:600}},l),
    t==='c'
      ? h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},items.map((s,i)=>h('span',{key:i,className:'tag tag-d',style:{fontSize:12}},safeText(s))))
      : t==='l'
        ? items.map((p,i)=>h('div',{key:i,style:{fontSize:14,color:'var(--t)',padding:'8px 0',borderBottom:'1px solid var(--brd)'}},safeText(p)))
        : items.map((p,i)=>h('div',{key:i,style:{fontSize:14,color:'var(--t)',padding:'10px 14px',background:'var(--rd2)',border:'1px solid rgba(220,38,38,.1)',borderRadius:6,marginBottom:5}},safeText(p)))
  )
}

ReactDOM.render(h(AppErrorBoundary,null,h(App)),document.getElementById('root'));
</script>
