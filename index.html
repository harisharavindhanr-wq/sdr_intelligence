ANALYSIS (DO ALL 7 STEPS THOROUGHLY):

STEP 0 - USER COMPANY CONTEXT: Use the user's company profile to understand who the seller is, their industry, website, and positioning. Do NOT treat this as the detailed offerings list. Detailed offerings, ICP, metrics, and case studies must come from the Solution Repository. Classify the target account relationship as one of: prospect, competitor, partner, customer, vendor, unknown. If the target company provides similar IT services, digital engineering, AI/data services, cloud/app modernization, or staffing services, treat it as a likely competitor unless evidence says otherwise.

STEP 1 - TARGET COMPANY INTELLIGENCE: Extract from provided intel:
- Industry and sub-industry
- Company size and growth stage
- Hiring patterns (what roles, how many, which departments)
- Funding events or revenue signals
- Technology stack and digital initiatives
- Expansion signals (new markets, geographies, products)
- Partnerships, acquisitions, or M&A activity
- Organizational changes (new leadership, restructuring)
- Regulatory or compliance pressures
Convert to: business priorities, strategic direction, growth stage.

STEP 2 - BUSINESS PROBLEMS: Infer 3-5 specific challenges. Each MUST trace to a signal from Step 1. Do NOT use generic problems like "data quality" unless there is a specific signal pointing to it.

STEP 3 - PERSONA DEEP ANALYSIS: From role + LinkedIn details + LinkedIn research:
- What they own (budget, team, outcomes)
- What KPIs they are measured on
- What keeps them up at night
- Recent focus areas (from LinkedIn posts, career moves, stated interests)
- How company problems from Step 2 specifically land on THEIR desk
- Their decision-making authority level

STEP 4 - SOLUTION MATCHING (CRITICAL - BE PRECISE):
Match based on the INTERSECTION of: (a) company industry + signals, (b) inferred problems, (c) persona role + priorities.

SPECIFICITY RULES:
- Do NOT choose a broad horizontal solution just because no vertical solution fits.
- Do NOT choose Preparing Data for AI as a default fallback. It is valid ONLY when the target intelligence explicitly mentions data fragmentation, governance, pipelines, analytics gaps, data platforms, BI modernization, lakehouse/warehouse, or AI blocked by data readiness.
- If the target is an IT services, consulting, software development, cloud, AI/data services, or staffing company, first classify the account as competitor or partner candidate. In that case, prefer competitor-aware positioning or partnership context. Do NOT recommend Preparing Data for AI unless explicit internal data-platform pain exists.
- If persona is HR, sales, marketing, procurement, operations, or leadership without solution-specific signals, say No strong match instead of forcing a solution.
- Every recommendedSolution.signalMatch MUST name the exact source signals. If you cannot name them, return id "no-strong-match" and name "No strong match".

MATCHING RULES:
- Life Sciences AI: ONLY match if company is pharma, biotech, CRO, or runs clinical trials. Signals: protocol reviews, IRB submissions, clinical documentation, TMF, regulatory compliance.
- Content Intelligence: ONLY match if company deals with content syndication, eCommerce product data, publishing, media distribution, or financial content automation.
- Preparing Legacy for AI: ONLY match if company has specific legacy systems (PowerBuilder, Oracle Forms, Sybase, Pega, Informatica) mentioned in intel. Signals: legacy modernization, technical debt, migration plans.
- Preparing Data for AI: ONLY match if there are EXPLICIT, concrete signals about data fragmentation, governance problems, data pipeline issues, analytics gaps, warehouse/lakehouse/BI modernization, CDC/ETL, or blocked AI initiatives due to data readiness. NEVER use it for generic IT services companies, generic digital transformation, generic AI interest, or when the only signal is that the company is technology-related.
- AI Squad Augmentation: ONLY match if company is hiring AI/ML roles, building AI teams, running POCs, or has explicit signals about needing AI talent. Signals: AI hiring, team scaling, POC/MVP projects.
- Supply Chain Intelligence: ONLY match if company is in logistics, manufacturing, retail, 3PL, or has supply chain operations. Signals: warehouse, inventory, shipping, demand forecasting, labour management, equipment.
- Financial Operations Intelligence: ONLY match if persona is in finance, or company has high-volume invoice processing, contract management, or compliance/ESG reporting needs.

If NO solution is a strong match based on actual signals, say "No strong match" and explain why. Do NOT force a match.
If MULTIPLE solutions match, rank them by signal strength.

STEP 5 - CASE STUDY MATCHING: Review matched solution metrics. Prepare ANONYMIZED reference if relevant ("a similar-sized logistics company" not the actual name). Skip if none fits naturally.

STEP 6 - LINKEDIN PROFILE ANALYSIS: If LinkedIn details are provided, extract:
- Career trajectory and expertise areas
- Recent posts, articles, or activity themes
- Stated skills and endorsements
- Any personal interests or communication style cues
Use these to personalize the outreach.

STEP 7 - GENERATE OUTPUT using ALL analysis from steps 0-6. If relationship is competitor, do NOT create a normal sales pitch. Create competitor-aware positioning: concise opener, observed overlap, differentiation angle, and optional partnership-style CTA only if appropriate. If no strong solution match exists, explain no strong match and avoid generic data/AI pitches.

2. PERSONA HOOK (1-2 sentences): Reference their LinkedIn focus, career detail, or how the challenge specifically hits their function.
3. INSIGHT (2-3 sentences): Consultant-style observation about their specific challenge. Weave anonymized case study naturally if relevant. Do NOT pitch.
4. CTA (1 sentence): Ask for a quick call or chat.

LINKEDIN: 40-70 words. Persona reference + insight + CTA.
CALL SCRIPT: Hook, context to persona, problem insight, case study if relevant, question for meeting.

/* ══════════════════════════════════════════
   UNIVERSAL API CALLER with CORS proxy
   ══════════════════════════════════════════ */
const CORS_PROXIES=[
  'https://corsproxy.io/?url=',
  'https://api.allorigins.win/raw?url='
];

function proxyUrl(url,useProxy){
  if(!useProxy) return url;
  return CORS_PROXIES[0]+encodeURIComponent(url);
}

async function callAIOnce(cfg,{system,userContent},retries=2){
  const delay=ms=>new Promise(r=>setTimeout(r,ms));
  for(let attempt=1;attempt<=retries;attempt++){
    try{
      let text='';
      if(cfg.provider==='anthropic'){
        const body={model:cfg.model,max_tokens:2000,system,messages:[{role:"user",content:userContent}]};
        const r=await fetch(proxyUrl(cfg.url,cfg.useProxy),{method:"POST",headers:{"Content-Type":"application/json","x-api-key":cfg.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
        const d=await r.json();if(d.error) throw new Error(d.error.message);
        text=(d.content||[]).map(b=>b.text||"").filter(Boolean).join("\n");
      } else if(cfg.provider==='gemini'){
        const fullUrl=`${cfg.url}/models/${cfg.model}:generateContent?key=${cfg.key}`;
        const body={system_instruction:{parts:[{text:system}]},contents:[{parts:Array.isArray(userContent)?userContent:[{text:typeof userContent==='string'?userContent:JSON.stringify(userContent)}]}]};
        const r=await fetch(proxyUrl(fullUrl,cfg.useProxy),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
        const d=await r.json();if(d.error) throw new Error(d.error.message);
        text=d.candidates?.[0]?.content?.parts?.[0]?.text||'';
      } else if(cfg.provider==='cloudflare'){
        if(!cfg.cfAccountId) throw new Error('Cloudflare Account ID is required. Add it in the API Key tab.');
        const fullUrl=`${cfg.url}/${cfg.cfAccountId}/ai/run/${cfg.model}`;
        const msgs=[{role:"system",content:system},{role:"user",content:typeof userContent==='string'?userContent:JSON.stringify(userContent)}];
        const r=await fetch(proxyUrl(fullUrl,cfg.useProxy),{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${cfg.key}`},body:JSON.stringify({messages:msgs})});
        const d=await r.json();if(d.errors?.length) throw new Error(d.errors.map(x=>x.message).join('; '));if(d.error) throw new Error(d.error.message||JSON.stringify(d.error));
        text=d.result?.response||d.result?.content||d.result?.text||'';
      } else {
        const msgs=[{role:"system",content:system},{role:"user",content:typeof userContent==='string'?userContent:JSON.stringify(userContent)}];
        const headers={"Content-Type":"application/json","Authorization":`Bearer ${cfg.key}`};
        if(cfg.provider==='openrouter'){headers["HTTP-Referer"]=location.origin;headers["X-Title"]='SDR Engine'}
        const r=await fetch(proxyUrl(cfg.url,cfg.useProxy),{method:"POST",headers,body:JSON.stringify({model:cfg.model,messages:msgs,max_tokens:2000})});
        const d=await r.json();if(d.error) throw new Error(d.error.message||JSON.stringify(d.error));
        text=d.choices?.[0]?.message?.content||'';
      }
      return text;
    }catch(e){
      const msg=e.message||'';
      // If Failed to fetch and proxy not enabled, suggest enabling it
      if(msg.includes('Failed to fetch')&&!cfg.useProxy){
        throw new Error('Failed to fetch. This is likely a CORS error. Go to API Key tab and enable "Use CORS Proxy" toggle, then try again.');
      }
      if(attempt<retries&&(msg.includes('high demand')||msg.includes('overloaded')||msg.includes('RESOURCE_EXHAUSTED')||msg.includes('rate')||msg.includes('429')||msg.includes('503'))){
        await delay(attempt*3000);continue;
      }
      throw e;
    }
  }
}

async function callAI(cfg,args,retries=2){
  const failoverMessages=['rate','429','quota','limit','RESOURCE_EXHAUSTED','insufficient_quota','credit','billing','overloaded','high demand','503','500','timeout','Failed to fetch'];
  const wantsPdf=JSON.stringify(args.userContent||'').includes('application/pdf')||JSON.stringify(args.userContent||'').includes('inlineData');
  const list=(cfg.apiKeys&&cfg.apiKeys.length?cfg.apiKeys:[{id:'legacy',label:PRESETS[cfg.provider]?.name||cfg.provider,provider:cfg.provider,key:cfg.key,url:cfg.url,model:cfg.model,cfAccountId:cfg.cfAccountId,enabled:true}]).filter(k=>(k.enabled!==false)&&k.key&&(!wantsPdf||k.provider==='gemini'||k.provider==='anthropic'));
  if(!list.length) throw new Error('No enabled API keys found. Add at least one key in the API Key tab.');
  const ordered=[...list].sort((a,b)=>(a.lastFailedAt||0)-(b.lastFailedAt||0));
  let lastErr=null;
  for(const k of ordered){
    const single={...cfg,...k,provider:k.provider||cfg.provider,url:k.url||PRESETS[k.provider||cfg.provider]?.url||cfg.url,model:k.model||PRESETS[k.provider||cfg.provider]?.model||cfg.model,cfAccountId:k.cfAccountId||cfg.cfAccountId};
    try{
      const out=await callAIOnce(single,args,retries);
      k.lastUsedAt=Date.now();k.lastError='';k.successCount=(k.successCount||0)+1;
      return out;
    }catch(e){
      lastErr=e;const msg=e.message||'';k.lastFailedAt=Date.now();k.lastError=msg.slice(0,160);
      if(!failoverMessages.some(x=>msg.toLowerCase().includes(x.toLowerCase()))) break;
    }
  }
  throw new Error((lastErr?.message||'All API keys failed')+' | Tried '+ordered.map(k=>k.label||PRESETS[k.provider]?.name||k.provider).join(' -> '));
}
